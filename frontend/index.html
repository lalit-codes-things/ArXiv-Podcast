<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper to Podcast</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(135deg, #e0f2fe, #f8fafc 45%, #ede9fe); color: #0f172a; display: grid; place-items: center; }
    main { width: min(920px, calc(100% - 32px)); background: rgba(255,255,255,.86); border: 1px solid rgba(148,163,184,.35); border-radius: 28px; box-shadow: 0 24px 80px rgba(15,23,42,.12); padding: 40px; backdrop-filter: blur(12px); }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 5vw, 4rem); letter-spacing: -0.05em; }
    p { color: #475569; line-height: 1.7; }
    form { display: flex; gap: 12px; margin: 28px 0; flex-wrap: wrap; }
    input { flex: 1 1 280px; border: 1px solid #cbd5e1; border-radius: 16px; padding: 16px 18px; font-size: 1rem; outline: none; }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37,99,235,.12); }
    button { border: 0; border-radius: 16px; background: #2563eb; color: white; font-weight: 800; padding: 16px 22px; cursor: pointer; box-shadow: 0 12px 24px rgba(37,99,235,.25); }
    button:disabled { background: #94a3b8; cursor: wait; box-shadow: none; }
    .card { border: 1px solid #e2e8f0; background: white; border-radius: 20px; padding: 22px; margin-top: 18px; }
    .status { font-weight: 700; color: #1d4ed8; }
    .error { color: #dc2626; }
    img { width: 100%; border-radius: 14px; border: 1px solid #e2e8f0; margin-top: 12px; }
    audio { width: 100%; margin-top: 12px; }
    small { color: #64748b; }
  </style>
</head>
<body>
  <main>
    <h1>Paper to Podcast</h1>
    <p>Enter an arXiv ID and generate a 10+ minute Host/Expert conversation using OpenAI and free Edge TTS. No intro, outro, citation sounds, or extra audio assets.</p>
    <form id="generate-form">
      <input id="arxiv-id" name="arxiv_id" placeholder="e.g. 2401.12345" required />
      <button id="submit" type="submit">Generate podcast</button>
    </form>
    <section id="status" class="card" hidden></section>
    <section id="result" class="card" hidden></section>
  </main>
  <script>
    const form = document.getElementById('generate-form');
    const input = document.getElementById('arxiv-id');
    const button = document.getElementById('submit');
    const statusBox = document.getElementById('status');
    const resultBox = document.getElementById('result');
    let pollHandle = null;

    function setStatus(message, isError = false) {
      statusBox.hidden = false;
      statusBox.innerHTML = `<div class="${isError ? 'error' : 'status'}">${message}</div>`;
    }

    async function poll(jobId) {
      const response = await fetch(`/api/status/${jobId}`);
      const job = await response.json();
      if (!response.ok) throw new Error(job.detail || 'Unable to fetch status');
      setStatus(`${job.status}: ${job.message || ''}`);
      if (job.status === 'completed') {
        clearInterval(pollHandle);
        button.disabled = false;
        const result = job.result;
        resultBox.hidden = false;
        resultBox.innerHTML = `
          <h2>Your podcast is ready</h2>
          <small>${result.metadata.title}</small>
          <audio controls src="${result.audio_url}"></audio>
          <img src="${result.waveform_url}" alt="Generated waveform" />
        `;
      } else if (job.status === 'failed') {
        clearInterval(pollHandle);
        button.disabled = false;
        setStatus(job.error || 'Generation failed', true);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      button.disabled = true;
      resultBox.hidden = true;
      setStatus('Creating job...');
      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ arxiv_id: input.value })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || 'Unable to create job');
        setStatus(`queued: Job ${data.job_id}`);
        clearInterval(pollHandle);
        pollHandle = setInterval(() => poll(data.job_id).catch(error => setStatus(error.message, true)), 2000);
        poll(data.job_id);
      } catch (error) {
        button.disabled = false;
        setStatus(error.message, true);
      }
    });
  </script>
</body>
</html>
